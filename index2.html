<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Manager Cloud Pro - 2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<style>
    :root {
        --primary: #3b82f6; --success: #22c55e; --danger: #ef4444; --warning: #facc15;
        --glass-bg: rgba(15, 23, 42, 0.7); --border: rgba(255, 255, 255, 0.08);
    }
    body { 
        font-family: 'Segoe UI', sans-serif; color: white; margin: 0; min-height: 100vh; display: flex; flex-direction: column;
        background-image: url('https://i.postimg.cc/90F762pz/background.png'); background-size: cover; background-position: center; background-attachment: fixed;
        overflow-x: hidden;
    }
    
    #mainContent { display: none; flex-direction: column; min-height: 100vh; }
    h1 { text-align: center; padding: 20px 0; background: rgba(15, 23, 42, 0.6); margin: 0; border-bottom: 1px solid var(--border); backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center; gap: 15px; }
    .header-logo { height: 40px; width: auto; }
    .container { max-width: 1100px; margin: auto; padding: 15px; flex: 1; width: 100%; box-sizing: border-box; }
    .glass { background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 15px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2); }
    
    .btn-nav-back { 
        background: linear-gradient(135deg, #10b981, #059669); 
        width: auto; min-width: 180px; max-width: 220px; padding: 10px 20px; font-size: 14px; margin: 0 auto 15px auto;
        box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2); 
        border-radius: 10px; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 8px; color: white; font-weight: bold;
    }

    input, textarea { padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #334155; background: rgba(30, 41, 59, 0.5); color: white; width: 100%; box-sizing: border-box; outline: none; font-size: 15px; transition: border-color 0.2s; }
    input:focus, textarea:focus { border-color: var(--primary); }
    textarea { resize: vertical; min-height: 50px; }

    button { padding: 14px; margin: 5px 0; border-radius: 10px; border: none; font-size: 15px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    button:active:not(:disabled) { transform: scale(0.96); }
    
    .btn-add { background: var(--success); width: 100%; margin-top: 12px; }
    .btn-primary { background: var(--primary); width: 100%; }
    .btn-ghost { background: rgba(100, 116, 139, 0.3); border: 1px solid rgba(255,255,255,0.1); width: 100%; }
    .btn-logout { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.3); padding: 8px 18px; font-size: 13px; color: #fca5a5; margin: 0; }
    .btn-backup { background: rgba(30, 41, 59, 0.4); border: 1px solid var(--border); font-size: 11px; padding: 10px 15px; flex: 1; min-width: 90px; }

    .table-wrapper { overflow-x: auto; border-radius: 16px 16px 0 0; border: 1px solid var(--border); border-bottom: none; }
    table { width: 100%; border-collapse: collapse; background: var(--glass-bg); min-width: 750px; }
    td, th { padding: 13px 10px; border-bottom: 1px solid var(--border); text-align: right; font-size: 14px; }
    th { background: rgba(51, 65, 85, 0.5); color: #94a3b8; font-size: 12px; white-space: nowrap; }
    
    .code { background: rgba(51, 65, 85, 0.6); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-family: monospace; display: inline-block; letter-spacing: 1px; transition: 0.2s; }
    .code:hover { background: rgba(51, 65, 85, 0.95); transform: scale(1.04); }

    .form-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 0; }
    .form-row > * { flex: 1; min-width: 120px; margin: 0; }

    #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 6, 23, 0.85); z-index: 1000; backdrop-filter: blur(10px); overflow-y: auto; }
    .modal-box { background: #1e293b; margin: 5vh auto; width: 92%; max-width: 420px; border-radius: 24px; border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; max-height: 90vh; }
    .modal-body { padding: 20px; text-align: center; overflow-y: auto; flex: 1; }
    .modal-actions { padding: 15px 20px; background: rgba(15, 23, 42, 0.5); display: flex; flex-direction: column; gap: 8px; }

    #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); padding: 14px 28px; border-radius: 14px; opacity: 0; transition: 0.3s; z-index: 1001; font-weight: bold; color: white; backdrop-filter: blur(8px); white-space: nowrap; }
    footer { text-align: center; padding: 25px; font-size: 13px; color: #64748b; margin-top: auto; background: rgba(15, 23, 42, 0.6); border-top: 1px solid var(--border); }
    .admin-only { display: none; }

    .pagination-bar { display: flex; justify-content: center; align-items: center; gap: 10px; background: rgba(15, 23, 42, 0.8); padding: 15px; border-radius: 0 0 16px 16px; border: 1px solid var(--border); backdrop-filter: blur(16px); margin-bottom: 30px; }
    .page-indicator { background: var(--primary); padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 800; color: white; min-width: 110px; text-align: center; }
    .btn-nav { background: rgba(255,255,255,0.05); border: 1px solid var(--border); width: 42px; height: 42px; border-radius: 10px; margin: 0; padding: 0; }
</style>
</head>

<body>

<div id="mainContent">
    <h1><img src="https://i.postimg.cc/DZcGp0qh/logo.png" alt="Logo" class="header-logo"> Code Manager Cloud</h1>

    <div class="container">
        <div id="loginBox" class="glass" style="text-align:center;">
            <h3 style="margin:0 0 15px 0;">כניסה למערכת ענן</h3>
            <input id="password" type="password" placeholder="סיסמת מנהל" onkeydown="if(event.key==='Enter') loginAdmin()">
            <button onclick="loginAdmin()" class="btn-primary" style="margin-top:10px;"><i class="fa-solid fa-user-shield"></i> כניסה כמנהל</button>
            <button onclick="loginGuest()" class="btn-ghost" style="margin-top:10px;"><i class="fa-solid fa-eye"></i> כניסה כאורח</button>
        </div>

        <div id="app" style="display:none;">
            <div style="display:flex; justify-content:center;">
                <button onclick="window.location.href='index.html'" class="btn-nav-back">
                    <i class="fa-solid fa-house-lock"></i> מעבר לקודים של בתים
                </button>
            </div>

            <div style="display: flex; justify-content: flex-end; margin-bottom: 10px;">
                <button onclick="logout()" class="btn-logout"><i class="fa-solid fa-right-from-bracket"></i> יציאה</button>
            </div>

            <div id="backupZone" class="glass admin-only" style="display:none; gap:10px; justify-content:center; flex-wrap:wrap;">
                <button onclick="exportCSV()" class="btn-backup"><i class="fa-solid fa-file-excel"></i> אקסל</button>
                <button onclick="exportJSON()" class="btn-backup"><i class="fa-solid fa-file-code"></i> גיבוי</button>
                <button onclick="document.getElementById('importFile').click()" class="btn-backup" style="border-color: var(--primary);"><i class="fa-solid fa-upload"></i> שחזור</button>
                <input type="file" id="importFile" style="display:none" onchange="importToCloud(event)" accept=".json">
            </div>

            <div class="glass" style="display:flex; align-items:center;">
                <i class="fa-solid fa-magnifying-glass" style="color:#64748b; margin-left:10px;"></i>
                <input id="searchInput" placeholder="חיפוש..." oninput="currentPage=1; render()" style="background:transparent; border:none; margin:0;">
            </div>

            <div id="stats" style="font-size: 12px; color: #94a3b8; margin-bottom: 5px; text-align: left; padding: 0 5px;"></div>

            <div class="glass">
                <div class="form-row">
                    <input id="f_firstname" placeholder="שם פרטי">
                    <input id="f_lastname" placeholder="שם משפחה">
                </div>
                <div class="form-row">
                    <input id="f_id" placeholder="תעודת זהות" maxlength="9" inputmode="numeric">
                    <input id="f_city" placeholder="עיר">
                </div>
                <input id="f_address" placeholder="כתובת מלאה">
                <textarea id="f_notes" placeholder="הערות (אופציונלי)"></textarea>
                <button id="submitBtn" onclick="addToCloud()" class="btn-add">
                    <i class="fa-solid fa-cloud-arrow-up"></i> שלח לענן
                </button>
            </div>

            <div id="pendingSection" class="glass admin-only" style="border: 2px solid var(--warning);">
                <h4 style="margin:0 0 10px 0; color:var(--warning);"><i class="fa-solid fa-clock"></i> ממתינים לאישור:</h4>
                <div id="pendingList"></div>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>שם פרטי</th>
                            <th>משפחה</th>
                            <th style="text-align:center;">ת"ז</th>
                            <th>כתובת</th>
                            <th>עיר</th>
                            <th>הערות</th>
                            <th class="admin-only" style="text-align:center;">ניהול</th>
                        </tr>
                    </thead>
                    <tbody id="table"></tbody>
                </table>
            </div>

            <div id="paginationBar" class="pagination-bar">
                <button id="firstPage" title="עמוד ראשון" class="btn-nav" onclick="goToFirstPage()"><i class="fa-solid fa-angles-right"></i></button>
                <button id="prevPage" title="הקודם" class="btn-nav" onclick="changePage(-1)"><i class="fa-solid fa-chevron-right"></i></button>
                <div id="pageIndicator" class="page-indicator">עמוד 1 מתוך 1</div>
                <button id="nextPage" title="הבא" class="btn-nav" onclick="changePage(1)"><i class="fa-solid fa-chevron-left"></i></button>
                <button id="lastPage" title="עמוד אחרון" class="btn-nav" onclick="goToLastPage()"><i class="fa-solid fa-angles-left"></i></button>
            </div>
        </div>
    </div>

    <footer>© כל הזכויות שמורות - אלכסנדר זבודיסקר 2026</footer>
</div>

<div id="modal">
    <div class="modal-box">
        <div class="modal-body" id="modalContent"></div>
        <div class="modal-actions" id="modalBtns"></div>
    </div>
</div>
<div id="toast"></div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDcJalubKZIOSBZzhWqAw3Hf1rLesz5FbQ",
    authDomain: "code-manager-314c2.firebaseapp.com",
    databaseURL: "https://code-manager-314c2-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "code-manager-314c2",
    storageBucket: "code-manager-314c2.firebasestorage.app",
    messagingSenderId: "673454437709",
    appId: "1:673454437709:web:690e62bb83290a086b3304"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let data = [], pending = [], isAdmin = sessionStorage.getItem("isAdmin") === "true";
let currentPage = 1, itemsPerPage = 10, toastTimer, totalPagesCount = 1;

const ADMIN_HASH = "e1045583d773c03b76cab17c591d36b1d932e8b74bd0e83190dacd597826ba19";

async function hashPass(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

window.onload = function() {
    if (isAdmin) showApp();
    showModal(
        `<h3>הצהרת פרטיות</h3><p>השימוש במידע לצורכי עבודה בלבד.</p>`,
        `<button onclick="confirmEntry()" style="background:var(--success); width:100%;">אישור - כניסה</button>
         <button onclick="rejectEntry()" style="background:var(--danger); width:100%;">ביטול</button>`
    );
};

function confirmEntry() { closeModal(); document.getElementById('mainContent').style.display = 'flex'; toast("שלום 👋"); }
function rejectEntry() { window.location.href = "https://www.google.com"; }

db.ref('codes').on('value', s => { data = s.val() ? Object.values(s.val()) : []; render(); });
db.ref('pending').on('value', s => { pending = s.val() ? Object.entries(s.val()) : []; render(); });

async function loginAdmin() {
    const input = document.getElementById("password").value;
    if (!input) return toast("הכנס סיסמה", "#ef4444");
    const inputHash = await hashPass(input);
    if (inputHash === ADMIN_HASH) {
        isAdmin = true; sessionStorage.setItem("isAdmin", "true");
        showApp(); toast("מנהל מחובר 👑");
    } else { toast("סיסמה שגויה", "#ef4444"); }
}

function loginGuest() { isAdmin = false; showApp(); toast("כניסת אורח 👁️"); }

function logout() {
    isAdmin = false; sessionStorage.removeItem("isAdmin");
    document.getElementById("app").style.display = "none";
    document.getElementById("loginBox").style.display = "block";
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
}

function showApp() {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("app").style.display = "block";
    if (isAdmin) {
        document.querySelectorAll('.admin-only').forEach(el => {
            if (el.id === 'backupZone') el.style.display = 'flex';
            else if (el.tagName === 'TH' || el.tagName === 'TD') el.style.display = 'table-cell';
            else el.style.display = 'block';
        });
    }
    render();
}

function render() {
    const term = (document.getElementById("searchInput")?.value || "").toLowerCase();
    const tableBody = document.getElementById("table");
    
    let filtered = data.filter(d =>
        (d.firstname || "").toLowerCase().includes(term) ||
        (d.lastname || "").toLowerCase().includes(term) ||
        (d.address || "").toLowerCase().includes(term) ||
        (d.city || "").toLowerCase().includes(term)
    );

    filtered.sort((a, b) => {
        const first = (a.firstname || "").localeCompare(b.firstname || "", 'he');
        if (first !== 0) return first;
        return (a.lastname || "").localeCompare(b.lastname || "", 'he');
    });

    totalPagesCount = Math.ceil(filtered.length / itemsPerPage) || 1;
    if (currentPage > totalPagesCount) currentPage = totalPagesCount;
    const pageItems = filtered.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);

    document.getElementById("stats").innerText = `רשומות: ${filtered.length}`;
    document.getElementById("pageIndicator").innerText = `עמוד ${currentPage} מתוך ${totalPagesCount}`;
    
    // ניהול מצב הכפתורים
    document.getElementById("firstPage").disabled = (currentPage === 1);
    document.getElementById("prevPage").disabled = (currentPage === 1);
    document.getElementById("nextPage").disabled = (currentPage === totalPagesCount);
    document.getElementById("lastPage").disabled = (currentPage === totalPagesCount);

    if (filtered.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="${isAdmin ? 7 : 6}" style="text-align:center; padding:40px; color:#64748b;">אין נתונים</td></tr>`;
        document.getElementById("paginationBar").style.display = "none";
    } else {
        document.getElementById("paginationBar").style.display = "flex";
        tableBody.innerHTML = pageItems.map(d => `
            <tr>
                <td>${d.firstname || "—"}</td>
                <td>${d.lastname || "—"}</td>
                <td style="text-align:center;"><span class="code" onclick="handleIdClick(this, '${d.id}')">••••••</span></td>
                <td>${d.address || "—"}</td>
                <td>${d.city || "—"}</td>
                <td title="${(d.notes || '')}">${d.notes || '—'}</td>
                ${isAdmin ? `<td style="text-align:center;">
                    <i class="fa-solid fa-pen" onclick="editItem('${d.id}')" style="color:var(--primary); cursor:pointer; margin-left:10px;"></i>
                    <i class="fa-solid fa-trash" onclick="confirmDelete('${d.id}', '${d.firstname} ${d.lastname}')" style="color:var(--danger); cursor:pointer;"></i>
                </td>` : ''}
            </tr>`).join("");
    }

    if (isAdmin && pending.length > 0) {
        document.getElementById("pendingSection").style.display = "block";
        document.getElementById("pendingList").innerHTML = pending.map(([id, p]) => `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; background:rgba(255,255,255,0.03); padding:8px; border-radius:8px;">
                <span style="font-size:12px;">${p.firstname} ${p.lastname} | ${p.city}</span>
                <div style="display:flex; gap:5px;">
                    <button onclick="approvePending('${id}')" style="background:var(--success); padding:4px 8px; font-size:11px;">אשר</button>
                    <button onclick="rejectPending('${id}')" style="background:var(--danger); padding:4px 8px; font-size:11px;">מחק</button>
                </div>
            </div>`).join("");
    } else { document.getElementById("pendingSection").style.display = "none"; }
}

function changePage(dir) { currentPage += dir; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
function goToFirstPage() { currentPage = 1; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
function goToLastPage() { currentPage = totalPagesCount; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }

async function handleIdClick(el, id) {
    const item = data.find(d => d.id === id);
    if (!item || el.innerText !== "••••••") { el.innerText = "••••••"; return; }
    el.innerText = item.idnum;
    try { if (navigator.clipboard) await navigator.clipboard.writeText(item.idnum); toast("ת\"ז הועתקה! 📋"); } catch(e) {}
    setTimeout(() => { if (el.innerText !== "••••••") el.innerText = "••••••"; }, 4000);
}

function addToCloud() {
    const btn = document.getElementById("submitBtn");
    const fields = ["f_firstname", "f_lastname", "f_id", "f_address", "f_city"];
    const vals = fields.map(id => document.getElementById(id).value.trim());
    if (vals.some(v => !v)) return toast("מלא את כל השדות", "#ef4444");
    if (!/^\d{9}$/.test(vals[2])) return toast("ת\"ז חייבת להיות 9 ספרות", "#ef4444");

    const dup = data.find(d => d.idnum === vals[2]) || pending.find(([, p]) => p.idnum === vals[2]);
    if (dup) return toast("ת\"ז כבר קיימת! 🚫", "#ef4444");

    btn.disabled = true; btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> שולח...`;
    db.ref('pending').push({ firstname: vals[0], lastname: vals[1], idnum: vals[2], address: vals[3], city: vals[4], notes: document.getElementById("f_notes").value.trim() })
    .then(() => { fields.concat("f_notes").forEach(id => document.getElementById(id).value = ""); toast("נשלח לאישור ☁️"); })
    .catch(() => toast("שגיאה בשליחה", "#ef4444")).finally(() => { btn.disabled = false; btn.innerHTML = `<i class="fa-solid fa-cloud-arrow-up"></i> שלח לענן`; });
}

function approvePending(id) {
    const pair = pending.find(([k]) => k === id);
    if (!pair) return;
    const newId = Date.now().toString();
    db.ref('codes/' + newId).set({ id: newId, ...pair[1] }).then(() => db.ref('pending/' + id).remove()).then(() => toast("אושר בהצלחה! ✅"));
}

function rejectPending(id) { db.ref('pending/' + id).remove(); }

function editItem(id) {
    const d = data.find(x => x.id === id);
    showModal(`<h3>עריכה</h3><div class="form-row"><input id="eFirst" value="${d.firstname}"><input id="eLast" value="${d.lastname}"></div><div class="form-row"><input id="eId" value="${d.idnum}" maxlength="9"><input id="eCity" value="${d.city}"></div><input id="eAddress" value="${d.address}"><textarea id="eNotes">${d.notes || ''}</textarea>`,
    `<button onclick="saveEdit('${id}')" style="background:var(--success); width:100%;">שמור</button><button onclick="closeModal()" style="background:transparent; width:100%;">ביטול</button>`);
}

function saveEdit(id) {
    const vals = ["eFirst", "eLast", "eId", "eAddress", "eCity"].map(id => document.getElementById(id).value.trim());
    if (vals.some(v => !v)) return toast("מלא שדות", "#ef4444");
    db.ref('codes/' + id).update({ firstname: vals[0], lastname: vals[1], idnum: vals[2], address: vals[3], city: vals[4], notes: document.getElementById("eNotes").value.trim() })
    .then(() => { closeModal(); toast("עודכן! ✏️"); });
}

function confirmDelete(id, name) { showModal(`<h3>מחיקה</h3><p>למחוק את <b>${name}</b>?</p>`, `<button onclick="deleteItem('${id}')" style="background:var(--danger); width:100%;">מחק</button><button onclick="closeModal()" style="background:transparent; width:100%;">ביטול</button>`); }
function deleteItem(id) { db.ref('codes/' + id).remove().then(() => { closeModal(); toast("נמחק! 🗑️"); }); }

function showModal(content, btns) { document.getElementById("modalContent").innerHTML = content; document.getElementById("modalBtns").innerHTML = btns; document.getElementById("modal").style.display = "block"; }
function closeModal() { document.getElementById("modal").style.display = "none"; }
function toast(msg, color="#22c55e") { const t = document.getElementById("toast"); clearTimeout(toastTimer); t.innerText = msg; t.style.background = color; t.style.opacity = "1"; toastTimer = setTimeout(() => t.style.opacity = "0", 2500); }

function exportJSON() { const a = document.createElement("a"); a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data)); a.download = "backup.json"; a.click(); }
function exportCSV() {
    let csv = "\ufeffשם פרטי,שם משפחה,תעודת זהות,כתובת,עיר,הערות\n" + data.map(i => `"${i.firstname}","${i.lastname}","${i.idnum}","${i.address}","${i.city}","${i.notes || ''}"`).join("\n");
    const a = document.createElement("a"); a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv); a.download = "backup.csv"; a.click();
}

function importToCloud(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
        try {
            const imported = JSON.parse(ev.target.result);
            imported.forEach(i => { if (i.firstname && i.lastname) { const id = Date.now() + "" + Math.floor(Math.random() * 1000); db.ref('codes/' + id).set({ id, ...i }); } });
            toast("שוחזר! 🔄");
        } catch (err) { toast("קובץ לא תקין", "#ef4444"); }
    };
    if (e.target.files[0]) reader.readAsText(e.target.files[0]);
}
</script>
</body>
</html>
