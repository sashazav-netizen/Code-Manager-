<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Manager Cloud Pro - 2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<style>
    :root {
        --primary: #3b82f6; --success: #22c55e; --danger: #ef4444; --warning: #facc15;
        --glass-bg: rgba(15, 23, 42, 0.7); --border: rgba(255, 255, 255, 0.08);
    }
    body {
        font-family: 'Segoe UI', sans-serif; color: white; margin: 0; min-height: 100vh; display: flex; flex-direction: column;
        background-image: url('https://i.postimg.cc/90F762pz/background.png'); background-size: cover; background-position: center; background-attachment: fixed;
        overflow-x: hidden;
    }

    #mainContent { display: none; flex-direction: column; min-height: 100vh; }
    h1 { text-align: center; padding: 20px 0; background: rgba(15, 23, 42, 0.6); margin: 0; border-bottom: 1px solid var(--border); backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center; gap: 15px; }
    .header-logo { height: 40px; width: auto; }
    .container { max-width: 900px; margin: 0 auto; padding: 15px; flex: 1; width: 100%; box-sizing: border-box; }
    .glass { background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }

    input { padding: 14px; margin: 5px 0; border-radius: 10px; border: 1px solid #334155; background: rgba(30,41,59,0.5); color: white; width: 100%; box-sizing: border-box; outline: none; font-size: 15px; transition: border-color 0.2s; }
    input:focus { border-color: var(--primary); }
    input::placeholder { color: #64748b; }

    button { padding: 14px; margin: 5px 0; border-radius: 10px; border: none; font-size: 15px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button:active:not(:disabled) { transform: scale(0.96); }

    .btn-add     { background: var(--success); width: 100%; margin-top: 12px; }
    .btn-primary { background: var(--primary); width: 100%; }
    .btn-ghost   { background: rgba(100,116,139,0.3); border: 1px solid rgba(255,255,255,0.1); width: 100%; }
    .btn-logout  { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.3); padding: 8px 18px; font-size: 13px; color: #fca5a5; margin: 0; }
    .btn-backup  { background: rgba(30,41,59,0.4); border: 1px solid var(--border); font-size: 11px; padding: 10px 15px; flex: 1; min-width: 90px; }

    .table-wrapper { width: 100%; overflow: hidden; border-radius: 16px 16px 0 0; border: 1px solid var(--border); border-bottom: none; }
    table { width: 100%; border-collapse: collapse; background: var(--glass-bg); backdrop-filter: blur(16px); table-layout: fixed; }
    td, th { padding: 16px 12px; border-bottom: 1px solid var(--border); text-align: right; word-break: break-word; vertical-align: middle; }
    th { background: rgba(51,65,85,0.5); color: #94a3b8; font-size: 12px; }

    th:nth-child(1), td:nth-child(1) { width: 50%; }
    th:nth-child(2), td:nth-child(2) { width: 30%; text-align: center; }
    th:nth-child(3), td:nth-child(3) { width: 20%; text-align: center; }

    .code { background: rgba(51,65,85,0.6); padding: 6px 12px; border-radius: 8px; cursor: pointer; font-family: monospace; display: inline-block; transition: 0.2s; letter-spacing: 1px; font-size: 14px; }
    .code:hover { background: rgba(51,65,85,0.95); transform: scale(1.04); }

    .pagination-bar {
        display: flex; justify-content: center; align-items: center; gap: 10px;
        background: rgba(15,23,42,0.8); padding: 15px;
        border-radius: 0 0 16px 16px; border: 1px solid var(--border);
        backdrop-filter: blur(16px); margin-bottom: 30px;
    }
    .page-indicator {
        background: var(--primary); padding: 6px 14px; border-radius: 20px;
        font-size: 12px; font-weight: 800; color: white; min-width: 100px; text-align: center;
        box-shadow: 0 0 15px rgba(59,130,246,0.2);
    }
    .btn-nav { background: rgba(255,255,255,0.05); border: 1px solid var(--border); width: 40px; height: 40px; border-radius: 10px; margin: 0; padding: 0; }

    #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2,6,23,0.85); z-index: 1000; backdrop-filter: blur(10px); }
    .modal-box { background: #1e293b; margin: 15vh auto; width: 90%; max-width: 340px; border-radius: 24px; border: 1px solid var(--border); overflow: hidden; }
    .modal-body { padding: 30px 20px; text-align: center; }
    .modal-body input { width: 100%; box-sizing: border-box; margin-bottom: 8px; }
    .modal-actions { display: flex; flex-direction: column; padding: 0 20px 20px; gap: 8px; }
    .modal-actions button { width: 100%; margin: 0; }

    #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); padding: 14px 28px; border-radius: 14px; opacity: 0; transition: 0.3s; z-index: 1001; font-weight: bold; color: white; backdrop-filter: blur(8px); white-space: nowrap; }

    footer { text-align: center; padding: 25px; font-size: 13px; color: #64748b; margin-top: auto; background: rgba(15,23,42,0.6); border-top: 1px solid var(--border); }
    .admin-only { display: none; }
</style>
</head>

<body>
<div id="mainContent">
    <h1>
        <img src="https://i.postimg.cc/DZcGp0qh/logo.png" alt="Logo" class="header-logo">
        Code Manager Cloud
    </h1>

    <div class="container">
        <div id="loginBox" class="glass" style="text-align:center;">
            <h3 style="margin:0 0 15px 0;">כניסה למערכת ענן</h3>
            <input id="password" type="password" placeholder="סיסמת מנהל" onkeydown="if(event.key==='Enter') loginAdmin()">
            <button onclick="loginAdmin()" class="btn-primary" style="margin-top:10px;"><i class="fa-solid fa-user-shield"></i> כניסה כמנהל</button>
            <button onclick="loginGuest()" class="btn-ghost" style="margin-top:10px;"><i class="fa-solid fa-eye"></i> כניסה כאורח</button>
        </div>

        <div id="app" style="display:none;">
            <div style="display:flex; justify-content:flex-end; margin-bottom:10px;">
                <button onclick="logout()" class="btn-logout"><i class="fa-solid fa-right-from-bracket"></i> יציאה מהמערכת</button>
            </div>

            <div id="backupZone" class="glass admin-only" style="display:none; gap:10px; justify-content:center; flex-wrap:wrap;">
                <button onclick="exportCSV()" class="btn-backup"><i class="fa-solid fa-file-excel"></i> אקסל</button>
                <button onclick="exportJSON()" class="btn-backup"><i class="fa-solid fa-file-code"></i> גיבוי</button>
                <button onclick="document.getElementById('importFile').click()" class="btn-backup" style="border-color:var(--primary);"><i class="fa-solid fa-upload"></i> שחזור</button>
                <input type="file" id="importFile" style="display:none" onchange="importToCloud(event)" accept=".json">
            </div>

            <div class="glass" style="display:flex; align-items:center;">
                <i class="fa-solid fa-magnifying-glass" style="color:#64748b; margin-left:10px;"></i>
                <input id="searchInput" placeholder="חיפוש כתובת..." oninput="currentPage=1; render()" style="background:transparent; border:none; margin:0;">
            </div>

            <div id="stats" style="font-size:12px; color:#94a3b8; margin-bottom:5px; text-align:left; padding:0 5px;"></div>

            <div class="glass">
                <input id="address" placeholder="כתובת / תיאור המקום">
                <input id="code" placeholder="הכנס קוד גישה" style="margin-top:10px;" onkeydown="if(event.key==='Enter') addToCloud()">
                <button id="submitBtn" onclick="addToCloud()" class="btn-add">
                    <i class="fa-solid fa-cloud-arrow-up"></i> שלח לענן לאישור
                </button>
            </div>

            <div id="pendingSection" class="glass admin-only" style="border:2px solid var(--warning);">
                <h4 style="margin:0 0 10px 0; color:var(--warning);"><i class="fa-solid fa-clock"></i> בקשות ממתינות לאישור:</h4>
                <div id="pendingList"></div>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>כתובת</th>
                            <th style="text-align:center;">קוד</th>
                            <th class="admin-only" style="text-align:center;">ניהול</th>
                        </tr>
                    </thead>
                    <tbody id="table"></tbody>
                </table>
            </div>

            <div id="paginationBar" class="pagination-bar">
                <button id="firstPage" class="btn-nav" onclick="goToFirstPage()"><i class="fa-solid fa-angles-right"></i></button>
                <button id="prevPage"  class="btn-nav" onclick="changePage(-1)"><i class="fa-solid fa-chevron-right"></i></button>
                <div id="pageIndicator" class="page-indicator">עמוד 1 מתוך 1</div>
                <button id="nextPage"  class="btn-nav" onclick="changePage(1)"><i class="fa-solid fa-chevron-left"></i></button>
            </div>
        </div>
    </div>

    <footer>© כל הזכויות שמורות - אלכסנדר זבודיסקר 2026</footer>
</div>

<div id="modal">
    <div class="modal-box">
        <div class="modal-body"    id="modalContent"></div>
        <div class="modal-actions" id="modalBtns"></div>
    </div>
</div>
<div id="toast"></div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDcJalubKZIOSBZzhWqAw3Hf1rLesz5FbQ",
    authDomain: "code-manager-314c2.firebaseapp.com",
    databaseURL: "https://code-manager-314c2-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "code-manager-314c2",
    storageBucket: "code-manager-314c2.firebasestorage.app",
    messagingSenderId: "673454437709",
    appId: "1:673454437709:web:690e62bb83290a086b3304"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let data = [], pending = [], isAdmin = sessionStorage.getItem("isAdmin") === "true";
let currentPage = 1;
const itemsPerPage = 10;
let toastTimer;

async function hashPass(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

window.onload = function () {
    if (isAdmin) showApp();
    showModal(
        `<h3>הצהרת פרטיות</h3><p>אני מאשר שהשימוש במידע לצורכי העבודה בלבד.</p>`,
        `<button onclick="confirmEntry()" style="background:var(--success); width:100%;">אישור - המשך למערכת</button>
         <button onclick="rejectEntry()"  style="background:var(--danger); width:100%;">ביטול - יציאה</button>`
    );
};

function confirmEntry() {
    closeModal();
    document.getElementById('mainContent').style.display = 'flex';
    toast("ברוך הבא 👋");
}
function rejectEntry() {
    window.location.href = "https://www.google.com";
}

db.ref('codes').on('value',   s => { data    = s.val() ? Object.values(s.val())  : []; render(); });
db.ref('pending').on('value', s => { pending = s.val() ? Object.entries(s.val()) : []; render(); });

async function loginAdmin() {
    const input = document.getElementById("password").value;
    const HASH  = "f9602521e67f0f4a56a6409893a79d06637492c68f6d639739e44040a4542f7c";
    const inputHash = await hashPass(input);
    if (input === "772555" || inputHash === HASH) {
        isAdmin = true; sessionStorage.setItem("isAdmin", "true");
        showApp(); toast("שלום מנהל 👑");
    } else { toast("סיסמה שגויה", "#ef4444"); }
}

function loginGuest() { isAdmin = false; showApp(); toast("כניסת אורח 👁️"); }

function logout() {
    isAdmin = false; sessionStorage.removeItem("isAdmin");
    document.getElementById("app").style.display      = "none";
    document.getElementById("loginBox").style.display = "block";
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
}

function showApp() {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("app").style.display      = "block";
    if (isAdmin) {
        document.querySelectorAll('.admin-only').forEach(el => {
            el.style.display = (el.id === 'backupZone') ? 'flex'
                             : (el.tagName === 'TH' || el.tagName === 'TD') ? 'table-cell'
                             : 'block';
        });
    }
    render();
}

function render() {
    const term      = (document.getElementById("searchInput")?.value || "").toLowerCase();
    const tableBody = document.getElementById("table");

    let filtered = data.filter(d => (d.address || "").toLowerCase().includes(term));
    filtered.sort((a, b) => (a.address || "").localeCompare(b.address || "", 'he'));

    const totalPages = Math.ceil(filtered.length / itemsPerPage) || 1;
    if (currentPage > totalPages) currentPage = totalPages;
    const page = filtered.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);

    document.getElementById("stats").innerText         = `סה"כ: ${filtered.length} פריטים`;
    document.getElementById("pageIndicator").innerText = `עמוד ${currentPage} מתוך ${totalPages}`;
    document.getElementById("firstPage").disabled      = (currentPage === 1);
    document.getElementById("prevPage").disabled       = (currentPage === 1);
    document.getElementById("nextPage").disabled       = (currentPage === totalPages);

    if (filtered.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="${isAdmin ? 3 : 2}" style="text-align:center; padding:40px; color:#64748b;">לא נמצאו נתונים</td></tr>`;
        document.getElementById("paginationBar").style.display = "none";
    } else {
        document.getElementById("paginationBar").style.display = "flex";
        tableBody.innerHTML = page.map(d => `
            <tr>
                <td>${d.address || "ללא תיאור"}</td>
                <td style="text-align:center;"><span class="code" onclick="handleCodeClick(this,'${d.id}')">••••</span></td>
                ${isAdmin ? `<td style="text-align:center;">
                    <i class="fa-solid fa-pen" onclick="editItem('${d.id}')" style="color:var(--primary); cursor:pointer; margin-left:10px;"></i>
                    <i class="fa-solid fa-trash" onclick="confirmDelete('${d.id}','${(d.address||'').replace(/'/g,"\\'")}')" style="color:var(--danger); cursor:pointer;"></i>
                </td>` : ''}
            </tr>`).join("");
    }

    if (isAdmin && pending.length > 0) {
        document.getElementById("pendingSection").style.display = "block";
        document.getElementById("pendingList").innerHTML = pending.map(([id, p]) => `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; background:rgba(255,255,255,0.03); padding:10px; border-radius:8px;">
                <span style="font-size:14px; flex:1;">${p.address} <b>(${p.code})</b></span>
                <div style="display:flex; gap:5px;">
                    <button onclick="approve('${id}','${(p.address||'').replace(/'/g,"\\'")}','${(p.code||'').replace(/'/g,"\\'")}' )" style="background:var(--success); padding:5px 10px; font-size:12px;">אשר</button>
                    <button onclick="db.ref('pending/${id}').remove()" style="background:var(--danger); padding:5px 10px; font-size:12px;">מחק</button>
                </div>
            </div>`).join("");
    } else {
        document.getElementById("pendingSection").style.display = "none";
    }
}

function changePage(dir) { currentPage += dir; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
function goToFirstPage()  { currentPage = 1;    render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }

async function handleCodeClick(el, id) {
    const item = data.find(d => d.id === id);
    if (!item) return;
    if (el.innerText !== "••••") { el.innerText = "••••"; return; }
    el.innerText = item.code;
    try {
        if (navigator.clipboard?.writeText) await navigator.clipboard.writeText(item.code);
        else throw 0;
    } catch {
        const ta = document.createElement("textarea");
        ta.value = item.code; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
    }
    toast("הועתק ללוח! 📋");
    setTimeout(() => { if (el.innerText !== "••••") el.innerText = "••••"; }, 4000);
}

function addToCloud() {
    const btn  = document.getElementById("submitBtn");
    const aEl  = document.getElementById("address"), cEl = document.getElementById("code");
    const addr = aEl.value.trim(), code = cEl.value.trim();

    if (!addr || !code) return toast("מלא כתובת וקוד", "#ef4444");

    const norm = addr.toLowerCase();
    if (data.find(i => (i.address || "").toLowerCase() === norm))
        return toast("כתובת כבר קיימת!", "#ef4444");
    if (pending.find(([,p]) => (p.address || "").toLowerCase() === norm))
        return toast("כבר ממתין לאישור!", "#facc15");

    btn.disabled = true;
    btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> שולח...`;

    db.ref('pending').push({ address: addr, code })
        .then(() => { aEl.value = ""; cEl.value = ""; toast("נשלח לאישור ☁️", "#3b82f6"); })
        .catch(() => toast("שגיאת תקשורת", "#ef4444"))
        .finally(() => { btn.disabled = false; btn.innerHTML = `<i class="fa-solid fa-cloud-arrow-up"></i> שלח לענן לאישור`; });
}

function approve(id, address, code) {
    const newId = Date.now().toString();
    db.ref('codes/' + newId).set({ id: newId, address, code });
    db.ref('pending/' + id).remove();
    toast("אושר וסונכרן! ✅");
}

function confirmDelete(id, name) {
    showModal(`<h3>מחיקת פריט</h3><p>האם אתה בטוח שברצונך למחוק את <b>${name}</b>?</p>`,
        `<button onclick="db.ref('codes/${id}').remove(); closeModal(); toast('נמחק בהצלחה 🗑️');" style="background:var(--danger);">מחק לצמיתות</button>
         <button onclick="closeModal()" style="background:transparent;">ביטול וחזרה</button>`);
}

function editItem(id) {
    const item = data.find(d => d.id === id);
    if (!item) return;
    showModal(`<h3>עריכת נתונים</h3>
         <input id="editA" value="${item.address}" placeholder="כתובת" style="margin-bottom:8px;">
         <input id="editC" value="${item.code}"    placeholder="קוד">`,
        `<button onclick="saveEdit('${id}')" style="background:var(--success);">שמור שינויים</button>
         <button onclick="closeModal()" style="background:transparent;">ביטול</button>`);
}

function saveEdit(id) {
    const nA = document.getElementById("editA").value.trim(), nC = document.getElementById("editC").value.trim();
    if (!nA || !nC) return toast("מלא את כל השדות", "#ef4444");
    db.ref('codes/' + id).update({ address: nA, code: nC });
    closeModal(); toast("עודכן בהצלחה ✏️");
}

function exportJSON() {
    const a = document.createElement("a");
    a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data));
    a.download = "backup.json"; a.click();
}
function exportCSV() {
    const csv = "\ufeffכתובת,קוד\n" + data.map(i => `"${(i.address||'').replace(/"/g,'""')}","${(i.code||'').replace(/"/g,'""')}"`).join("\n");
    const a = document.createElement("a");
    a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
    a.download = "backup.csv"; a.click();
}
function importToCloud(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        try {
            const imported = JSON.parse(ev.target.result);
            if (!confirm(`לשחזר ${imported.length} פריטים לענן?`)) return;
            imported.forEach(item => {
                const id = Date.now().toString() + Math.random().toString(36).substr(2,5);
                db.ref('codes/' + id).set({ id, address: item.address || '', code: item.code || '' });
            });
            toast("הנתונים שוחזרו! 🔄");
        } catch { toast("קובץ לא תקין", "#ef4444"); }
    };
    reader.readAsText(file);
    e.target.value = "";
}

function showModal(content, btns) {
    document.getElementById("modalContent").innerHTML = content;
    document.getElementById("modalBtns").innerHTML   = btns;
    document.getElementById("modal").style.display   = "block";
}
function closeModal() { document.getElementById("modal").style.display = "none"; }

function toast(msg, color = "#22c55e") {
    const t = document.getElementById("toast");
    clearTimeout(toastTimer);
    t.innerText = msg; t.style.background = color; t.style.opacity = "1";
    toastTimer = setTimeout(() => { t.style.opacity = "0"; }, 2500);
}
</script>
</body>
</html>
