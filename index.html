<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Manager Cloud Pro - 2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<style>
    :root {
        --primary: #3b82f6; --success: #22c55e; --danger: #ef4444; --warning: #facc15;
        --glass-bg: rgba(15, 23, 42, 0.7); --border: rgba(255, 255, 255, 0.08);
    }
    body { 
        font-family: 'Segoe UI', sans-serif; color: white; margin: 0; min-height: 100vh; display: flex; flex-direction: column;
        background-image: url('https://i.postimg.cc/90F762pz/background.png'); background-size: cover; background-position: center; background-attachment: fixed;
        overflow-x: hidden;
    }
    
    #mainContent { display: none; flex-direction: column; min-height: 100vh; }
    h1 { text-align: center; padding: 20px 0; background: rgba(15, 23, 42, 0.6); margin: 0; border-bottom: 1px solid var(--border); backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center; gap: 15px; }
    .header-logo { height: 40px; width: auto; }
    .container { max-width: 900px; margin: auto; padding: 15px; flex: 1; width: 100%; box-sizing: border-box; }
    .glass { background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 15px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2); }
    
    /* שורת ניווט עליונה */
    .top-nav-row { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; }
    .btn-nav-page { 
        background: linear-gradient(135deg, #10b981, #059669); 
        flex: 1; padding: 12px; font-size: 14px; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2); 
        border-radius: 50px; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 8px; color: white; font-weight: bold;
    }
    .btn-logout-top { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.3); padding: 12px 20px; border-radius: 50px; color: #fca5a5; cursor: pointer; transition: 0.3s; }

    /* כפתורי ניהול (שורה שנייה) */
    .admin-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .btn-manage { 
        background: rgba(30, 41, 59, 0.4); border: 1px solid var(--border); border-radius: 12px; 
        color: white; padding: 15px 5px; font-size: 14px; cursor: pointer; transition: 0.3s;
        display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-manage:hover { background: rgba(59, 130, 246, 0.2); border-color: var(--primary); }
    .btn-restore { border: 1px solid var(--primary); background: rgba(59, 130, 246, 0.1); }

    input { padding: 14px; margin: 5px 0; border-radius: 10px; border: 1px solid #334155; background: rgba(30, 41, 59, 0.5); color: white; width: 100%; box-sizing: border-box; outline: none; font-size: 15px; }
    button { cursor: pointer; border: none; font-weight: bold; transition: 0.3s; }
    
    .btn-add { background: var(--success); width: 100%; margin-top: 12px; color: white; padding: 14px; border-radius: 10px; }
    .btn-primary { background: var(--primary); width: 100%; color: white; padding: 14px; border-radius: 10px; }
    .btn-ghost { background: rgba(100, 116, 139, 0.3); border: 1px solid rgba(255,255,255,0.1); color: white; }

    table { width: 100%; border-collapse: collapse; background: var(--glass-bg); border-radius: 16px; overflow: hidden; }
    td, th { padding: 15px 12px; border-bottom: 1px solid var(--border); text-align: right; }
    th { background: rgba(51, 65, 85, 0.5); color: #94a3b8; font-size: 12px; }
    
    .code { background: rgba(51, 65, 85, 0.6); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-family: monospace; }

    #modal { display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.85); z-index: 1000; backdrop-filter: blur(10px); }
    .modal-box { background: #1e293b; margin: 10vh auto; width: 92%; max-width: 400px; border-radius: 24px; border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; }
    .modal-body { padding: 25px; text-align: center; }
    .modal-actions { padding: 15px; background: rgba(15, 23, 42, 0.5); display: flex; flex-direction: column; gap: 8px; }

    #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); padding: 14px 28px; border-radius: 14px; opacity: 0; transition: 0.3s; z-index: 1001; font-weight: bold; color: white; backdrop-filter: blur(8px); }
    footer { text-align: center; padding: 25px; font-size: 13px; color: #64748b; margin-top: auto; background: rgba(15, 23, 42, 0.6); border-top: 1px solid var(--border); }
    .admin-only { display: none; }

    .pagination-bar { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 20px; }
    .page-indicator { background: var(--primary); padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 800; min-width: 100px; text-align: center; }
    .nav-btn-sm { background: rgba(255,255,255,0.1); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 10px; color: white; }
</style>
</head>

<body>

<div id="modal"><div class="modal-box"><div class="modal-body" id="modalContent"></div><div class="modal-actions" id="modalBtns"></div></div></div>

<div id="mainContent">
    <h1><img src="https://i.postimg.cc/DZcGp0qh/logo.png" alt="Logo" class="header-logo"> Code Manager Cloud</h1>

    <div class="container">
        <div id="loginBox" class="glass" style="text-align:center;">
            <h3 style="margin:0 0 15px 0;">כניסה למערכת ענן</h3>
            <input id="password" type="password" placeholder="סיסמת מנהל" onkeydown="if(event.key==='Enter') loginAdmin()">
            <button onclick="loginAdmin()" class="btn-primary" style="margin-top:10px;"><i class="fa-solid fa-user-shield"></i> כניסה כמנהל</button>
            <button onclick="loginGuest()" class="btn-ghost" style="margin-top:10px; width:100%; padding:14px; border-radius:10px;"><i class="fa-solid fa-eye"></i> כניסה כאורח</button>
        </div>

        <div id="app" style="display:none;">
            <div class="top-nav-row">
                <a href="index2.html" class="btn-nav-page">
                    <i class="fa-solid fa-users"></i> ניהול אנשים
                </a>
                <button onclick="logout()" class="btn-logout-top">
                    <i class="fa-solid fa-power-off"></i>
                </button>
            </div>

            <div id="adminTools" class="admin-only admin-grid">
                <button onclick="exportCSV()" class="btn-manage"><i class="fa-solid fa-file-excel"></i> אקסל</button>
                <button onclick="exportJSON()" class="btn-manage"><i class="fa-solid fa-file-export"></i> גיבוי</button>
                <button onclick="document.getElementById('importFile').click()" class="btn-manage btn-restore"><i class="fa-solid fa-upload"></i> שחזור</button>
                <input type="file" id="importFile" hidden accept=".json" onchange="handleImport(event)">
            </div>

            <div class="glass" style="display:flex; align-items:center;">
                <i class="fa-solid fa-magnifying-glass" style="color:#64748b; margin-left:10px;"></i>
                <input id="searchInput" placeholder="חיפוש כתובת..." oninput="currentPage=1; render()" style="background:transparent; border:none; margin:0;">
            </div>

            <div id="stats" style="font-size: 12px; color: #94a3b8; margin-bottom: 8px; text-align: left; padding: 0 5px;"></div>

            <div class="glass">
                <input id="f_address" placeholder="שם המקום / כתובת">
                <input id="f_code" placeholder="קוד כניסה">
                <button id="submitBtn" onclick="addToCloud()" class="btn-add">
                    <i class="fa-solid fa-cloud-arrow-up"></i> שלח לענן לאישור
                </button>
            </div>

            <div id="pendingSection" class="glass admin-only" style="border: 2px solid var(--warning);">
                <h4 style="margin:0 0 10px 0; color:var(--warning);"><i class="fa-solid fa-clock"></i> ממתינים לאישור:</h4>
                <div id="pendingList"></div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>כתובת / תיאור</th>
                        <th style="text-align:center;">קוד</th>
                        <th class="admin-only" style="text-align:center;">ניהול</th>
                    </tr>
                </thead>
                <tbody id="table"></tbody>
            </table>

            <div id="paginationBar" class="pagination-bar">
                <button onclick="goToPage(1)" class="nav-btn-sm"><i class="fa-solid fa-angles-right"></i></button>
                <button onclick="changePage(-1)" class="nav-btn-sm"><i class="fa-solid fa-chevron-right"></i></button>
                <div id="pageIndicator" class="page-indicator">עמוד 1 מתוך 1</div>
                <button onclick="changePage(1)" class="nav-btn-sm"><i class="fa-solid fa-chevron-left"></i></button>
                <button id="lastBtn" onclick="goToPage(999)" class="nav-btn-sm"><i class="fa-solid fa-angles-left"></i></button>
            </div>
        </div>
    </div>

    <footer>© כל הזכויות שמורות לאלכסנדר זבודיסקר 2026</footer>
</div>

<div id="toast"></div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDcJalubKZIOSBZzhWqAw3Hf1rLesz5FbQ",
    authDomain: "code-manager-314c2.firebaseapp.com",
    databaseURL: "https://code-manager-314c2-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "code-manager-314c2",
    storageBucket: "code-manager-314c2.firebasestorage.app",
    messagingSenderId: "673454437709",
    appId: "1:673454437709:web:690e62bb83290a086b3304"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let data = [], pending = [], isAdmin = sessionStorage.getItem("isAdmin") === "true";
let currentPage = 1, itemsPerPage = 10, totalPages = 1, toastTimer;

window.onload = function() {
    if (isAdmin) showApp();
    showModal(`<h3>הצהרת פרטיות</h3><p>המידע במערכת מאובטח ונועד לצורכי עבודה בלבד.</p>`, 
    `<button onclick="confirmEntry()" style="background:var(--success); width:100%; color:white; padding:12px; border-radius:10px;">אישור וכניסה</button>`);
};

function confirmEntry() { closeModal(); document.getElementById('mainContent').style.display = 'flex'; }

db.ref('house_codes').on('value', s => { data = s.val() ? Object.values(s.val()) : []; render(); });
db.ref('pending_houses').on('value', s => { pending = s.val() ? Object.entries(s.val()) : []; render(); });

async function loginAdmin() {
    if (document.getElementById("password").value === "772555") { 
        isAdmin = true; sessionStorage.setItem("isAdmin", "true");
        showApp(); toast("שלום מנהל 👑"); 
    } else { toast("סיסמה שגויה", "#ef4444"); }
}

function loginGuest() { isAdmin = false; showApp(); }
function logout() { isAdmin = false; sessionStorage.removeItem("isAdmin"); location.reload(); }

function showApp() {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("app").style.display = "block";
    if (isAdmin) {
        document.querySelectorAll('.admin-only').forEach(el => el.style.display = (el.tagName==='TH'||el.tagName==='TD')?'table-cell':'grid');
    }
    render();
}

function render() {
    const term = document.getElementById("searchInput").value.toLowerCase();
    let filtered = data.filter(d => (d.address || "").toLowerCase().includes(term));
    filtered.sort((a, b) => (a.address || "").localeCompare(b.address || "", 'he'));

    totalPages = Math.ceil(filtered.length / itemsPerPage) || 1;
    const pageItems = filtered.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);

    document.getElementById("stats").innerText = `רשומות: ${filtered.length}`;
    document.getElementById("pageIndicator").innerText = `עמוד ${currentPage} מתוך ${totalPages}`;

    document.getElementById("table").innerHTML = pageItems.map(d => `
        <tr>
            <td style="font-weight:600;">${d.address}</td>
            <td style="text-align:center;"><span class="code" onclick="copyCode(this, '${d.code}')">••••</span></td>
            ${isAdmin ? `<td style="text-align:center;">
                <i class="fa-solid fa-pen" onclick="editItem('${d.id}')" style="color:var(--primary); cursor:pointer; margin-left:15px;"></i>
                <i class="fa-solid fa-trash" onclick="confirmDelete('${d.id}', '${d.address}')" style="color:var(--danger); cursor:pointer;"></i>
            </td>` : ''}
        </tr>`).join("");

    if (isAdmin && pending.length > 0) {
        document.getElementById("pendingSection").style.display = "block";
        document.getElementById("pendingList").innerHTML = pending.map(([id, p]) => `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; background:rgba(255,255,255,0.03); padding:10px; border-radius:8px;">
                <span>${p.address} | ${p.code}</span>
                <button onclick="approvePending('${id}')" style="background:var(--success); color:white; padding:5px 10px; font-size:12px; border-radius:5px;">אשר</button>
            </div>`).join("");
    } else { document.getElementById("pendingSection").style.display = "none"; }
}

function changePage(dir) { currentPage = Math.max(1, Math.min(totalPages, currentPage + dir)); render(); }
function goToPage(p) { currentPage = (p === 999) ? totalPages : p; render(); }

function exportCSV() {
    let csv = "\uFEFFכתובת,קוד\n";
    data.forEach(d => { csv += `"${d.address}","${d.code}"\n`; });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
    link.download = "Houses.csv"; link.click();
}

function exportJSON() {
    const link = document.createElement("a");
    link.href = URL.createObjectURL(new Blob([JSON.stringify(data)], { type: 'application/json' }));
    link.download = "Backup.json"; link.click();
}

function handleImport(e) {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = (ev) => {
        try {
            const imported = JSON.parse(ev.target.result);
            if (confirm(`לשחזר ${imported.length} בתים?`)) {
                imported.forEach(item => db.ref('house_codes/' + item.id).set(item));
                toast("השחזור בוצע! ✅");
            }
        } catch (err) { alert("קובץ לא תקין"); }
    };
    reader.readAsText(file);
}

function copyCode(el, code) {
    navigator.clipboard.writeText(code); el.innerText = code;
    toast("הועתק! 📋"); setTimeout(() => el.innerText = "••••", 3000);
}

function addToCloud() {
    const addr = document.getElementById("f_address").value.trim();
    const code = document.getElementById("f_code").value.trim();
    if (!addr || !code) return toast("מלא שדות", "#ef4444");
    const tempId = Date.now().toString();
    db.ref('pending_houses/' + tempId).set({ id: tempId, address: addr, code: code })
    .then(() => {
        document.getElementById("f_address").value = ""; document.getElementById("f_code").value = "";
        toast("נשלח לאישור ☁️");
    });
}

function approvePending(id) {
    const itemPair = pending.find(([k]) => k === id);
    if (!itemPair) return;
    const p = itemPair[1];
    db.ref('house_codes/' + id).set({ id: id, address: p.address, code: p.code });
    db.ref('pending_houses/' + id).remove();
}

function editItem(id) {
    const d = data.find(x => x.id === id);
    showModal(`<h3>עריכה</h3><input id="eAddr" value="${d.address}"><input id="eCode" value="${d.code}">`,
    `<button onclick="saveEdit('${id}')" style="background:var(--success); color:white; padding:10px; border-radius:10px;">שמור</button>
     <button onclick="closeModal()" style="background:transparent; color:white;">ביטול</button>`);
}

function saveEdit(id) {
    db.ref('house_codes/' + id).update({ address: document.getElementById("eAddr").value, code: document.getElementById("eCode").value });
    closeModal();
}

function confirmDelete(id, name) {
    showModal(`<h3>מחיקה</h3><p>למחוק את ${name}?</p>`, 
    `<button onclick="db.ref('house_codes/${id}').remove(); closeModal();" style="background:var(--danger); color:white; padding:10px; border-radius:10px;">מחק</button>
     <button onclick="closeModal()" style="background:transparent; color:white;">ביטול</button>`);
}

function showModal(c, b) { document.getElementById("modalContent").innerHTML = c; document.getElementById("modalBtns").innerHTML = b; document.getElementById("modal").style.display = "block"; }
function closeModal() { document.getElementById("modal").style.display = "none"; }
function toast(msg, color="#22c55e") {
    const t = document.getElementById("toast");
    clearTimeout(toastTimer); t.innerText = msg; t.style.background = color; t.style.opacity = "1";
    toastTimer = setTimeout(() => t.style.opacity = "0", 2500);
}
</script>
</body>
</html>
