<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Manager Cloud - 2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<style>
    :root {
        --primary: #3b82f6; --success: #22c55e; --danger: #ef4444; --warning: #facc15;
        --glass-bg: rgba(15, 23, 42, 0.7); --border: rgba(255, 255, 255, 0.08);
    }
    body { 
        font-family: 'Segoe UI', sans-serif; color: white; margin: 0; min-height: 100vh; display: flex; flex-direction: column;
        background-image: url('https://i.postimg.cc/90F762pz/background.png'); background-size: cover; background-position: center; background-attachment: fixed;
    }
    h1 { text-align: center; padding: 20px 0; background: rgba(15, 23, 42, 0.6); margin: 0; border-bottom: 1px solid var(--border); backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center; gap: 15px; }
    .header-logo { height: 40px; width: auto; }
    .container { max-width: 900px; margin: auto; padding: 20px; flex: 1; width: 100%; box-sizing: border-box; }
    .glass { background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 15px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2); }
    input { padding: 14px; margin: 5px; border-radius: 10px; border: 1px solid #334155; background: rgba(30, 41, 59, 0.5); color: white; width: calc(100% - 28px); box-sizing: border-box; outline: none; font-size: 15px; }
    input:focus { border-color: var(--primary); background: rgba(30, 41, 59, 0.8); }
    button { padding: 14px; margin: 5px; border-radius: 10px; border: none; font-size: 15px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    button:active { transform: scale(0.96); }
    .btn-add { background: var(--success); width: 100%; margin-top: 12px; }
    .btn-primary { background: var(--primary); }
    .btn-ghost { background: rgba(100, 116, 139, 0.3); border: 1px solid rgba(255,255,255,0.1); }
    .btn-logout { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.3); padding: 8px 18px; font-size: 13px; margin-bottom: 15px; color: #fca5a5; }
    .backup-zone { display: none; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
    .btn-backup { background: rgba(30, 41, 59, 0.4); border: 1px solid var(--border); font-size: 11px; padding: 10px 15px; flex: 1; }
    table { width: 100%; border-collapse: collapse; background: var(--glass-bg); border-radius: 16px; overflow: hidden; margin-top: 10px; backdrop-filter: blur(16px); border: 1px solid var(--border); }
    td, th { padding: 16px; border-bottom: 1px solid var(--border); text-align: right; }
    th { background: rgba(51, 65, 85, 0.5); color: #94a3b8; font-size: 12px; }
    .code { background: rgba(51, 65, 85, 0.6); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-family: monospace; display: inline-block; }
    
    /* Modal Styles */
    #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 6, 23, 0.85); z-index: 1000; backdrop-filter: blur(10px); }
    .modal-box { background: #1e293b; margin: 15vh auto; max-width: 340px; border-radius: 28px; text-align: center; border: 1px solid var(--border); overflow: hidden; animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes modalIn { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-body { padding: 35px 25px 25px; }
    .modal-actions { display: flex; flex-direction: column; padding: 0 25px 25px; gap: 8px; }
    .modal-actions button { margin: 0; padding: 16px; border-radius: 16px; }

    #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); padding: 14px 28px; border-radius: 14px; opacity: 0; transition: 0.3s; z-index: 1001; font-weight: bold; color: white; backdrop-filter: blur(8px); pointer-events: none; }
    footer { text-align: center; padding: 25px; font-size: 13px; color: #64748b; margin-top: auto; background: rgba(15, 23, 42, 0.6); border-top: 1px solid var(--border); }
    .admin-only { display: none; }
</style>
</head>

<body>

<h1><img src="https://i.postimg.cc/DZcGp0qh/logo.png" alt="Logo" class="header-logo"> Code Manager Cloud</h1>

<div class="container">
    <div id="loginBox" class="glass" style="text-align:center;">
        <h3 style="margin:0 0 15px 0;">כניסה למערכת ענן</h3>
        <input id="password" type="password" placeholder="סיסמת מנהל">
        <button onclick="loginAdmin()" class="btn-primary" style="width:100%; margin-top:10px;"><i class="fa-solid fa-user-shield"></i> כניסה כמנהל</button>
        <button onclick="loginGuest()" class="btn-ghost" style="width:100%; margin-top:10px;"><i class="fa-solid fa-eye"></i> כניסה כאורח</button>
    </div>

    <div id="app" style="display:none;">
        <div style="display: flex; justify-content: flex-end;">
            <button onclick="logout()" class="btn-logout"><i class="fa-solid fa-right-from-bracket"></i> יציאה</button>
        </div>

        <div id="backupZone" class="backup-zone admin-only">
            <button onclick="exportCSV()" class="btn-backup"><i class="fa-solid fa-file-excel"></i> אקסל</button>
            <button onclick="exportJSON()" class="btn-backup"><i class="fa-solid fa-file-code"></i> גיבוי ידני</button>
        </div>

        <div class="glass" style="display:flex; align-items:center;">
            <i class="fa-solid fa-magnifying-glass" style="color:#64748b; margin-left:10px;"></i>
            <input id="searchInput" placeholder="חיפוש כתובת..." oninput="render()" style="background:transparent; border:none; margin:0; width: 100%;">
        </div>

        <div class="glass">
            <input id="address" placeholder="כתובת / תיאור">
            <input id="code" placeholder="הכנס קוד" style="margin-top:10px;">
            <button onclick="addToCloud()" class="btn-add"><i class="fa-solid fa-cloud-arrow-up"></i> שלח לענן</button>
        </div>

        <div id="pendingSection" class="glass admin-only" style="border: 2px solid var(--warning);">
            <h4 style="margin:0 0 10px 0; color:var(--warning);"><i class="fa-solid fa-clock"></i> בקשות ממתינות:</h4>
            <div id="pendingList"></div>
        </div>

        <table>
            <thead><tr><th>כתובת</th><th>קוד</th><th class="admin-only">ניהול</th></tr></thead>
            <tbody id="table"></tbody>
        </table>
    </div>
</div>

<footer>© כל הזכויות שמורות - אלכסנדר זבודיסקר 2026</footer>

<div id="modal">
    <div class="modal-box">
        <div class="modal-body" id="modalContent"></div>
        <div class="modal-actions" id="modalBtns"></div>
    </div>
</div>
<div id="toast"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDcJalubKZIOSBZzhWqAw3Hf1rLesz5FbQ",
  authDomain: "code-manager-314c2.firebaseapp.com",
  databaseURL: "https://code-manager-314c2-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "code-manager-314c2",
  storageBucket: "code-manager-314c2.firebasestorage.app",
  messagingSenderId: "673454437709",
  appId: "1:673454437709:web:690e62bb83290a086b3304"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const ADMIN_PASS = "1234";
let data = [];
let pending = [];
let isAdmin = false;

// האזנה לשינויים בענן
db.ref('codes').on('value', (snapshot) => {
    const val = snapshot.val();
    data = val ? Object.values(val) : [];
    render();
});

db.ref('pending').on('value', (snapshot) => {
    const val = snapshot.val();
    pending = val ? Object.entries(val) : [];
    render();
});

function toast(msg, color = "#22c55e") {
    const t = document.getElementById("toast");
    t.innerText = msg; t.style.background = color; t.style.opacity = "1";
    setTimeout(() => { t.style.opacity = "0"; }, 2000);
}

function loginAdmin() {
    if (document.getElementById("password").value === ADMIN_PASS) {
        isAdmin = true; showApp(); toast("שלום מנהל!");
    } else { toast("סיסמה שגויה", "#ef4444"); }
}

function loginGuest() { isAdmin = false; showApp(); toast("כניסת אורח", "#3b82f6"); }

function logout() {
    isAdmin = false;
    document.getElementById("app").style.display = "none";
    document.getElementById("loginBox").style.display = "block";
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
}

function showApp() {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("app").style.display = "block";
    if (isAdmin) {
        document.querySelectorAll('.admin-only').forEach(el => {
            el.style.display = (el.id === 'backupZone') ? 'flex' : 'block';
        });
    }
    render();
}

function render() {
    const term = document.getElementById("searchInput").value.toLowerCase();
    const tableBody = document.getElementById("table");
    const filtered = data.filter(d => d.address.toLowerCase().includes(term));
    filtered.sort((a, b) => a.address.localeCompare(b.address, 'he'));
    
    tableBody.innerHTML = filtered.map((d) => `
        <tr>
            <td>${d.address}</td>
            <td><span class="code" onclick="toggleCode(this, '${d.code}')">••••</span></td>
            ${isAdmin ? `<td>
                <button onclick="editItem('${d.id}')" style="background:none; color:var(--primary); padding:5px;"><i class="fa-solid fa-pen"></i></button>
                <button onclick="deleteFromCloud('${d.id}')" style="background:none; color:var(--danger); padding:5px;"><i class="fa-solid fa-trash"></i></button>
            </td>` : ''}
        </tr>
    `).join("");

    if (isAdmin && pending.length > 0) {
        document.getElementById("pendingSection").style.display = "block";
        document.getElementById("pendingList").innerHTML = pending.map(([id, p]) => `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; background:rgba(255,255,255,0.03); padding:10px; border-radius:8px;">
                <span>${p.address} <b>(${p.code})</b></span>
                <div style="display:flex; gap:5px;">
                    <button onclick="approve('${id}', '${p.address}', '${p.code}')" style="background:var(--success); padding:5px 10px; font-size:12px;">אשר</button>
                    <button onclick="reject('${id}')" style="background:var(--danger); padding:5px 10px; font-size:12px;">מחק</button>
                </div>
            </div>
        `).join("");
    } else { document.getElementById("pendingSection").style.display = "none"; }
}

function toggleCode(el, code) {
    if (el.innerText === "••••") {
        el.innerText = code;
        navigator.clipboard.writeText(code);
        toast("הקוד הועתק!");
    } else { el.innerText = "••••"; }
}

// ענן - הוספה
function addToCloud() {
    const a = document.getElementById("address"), c = document.getElementById("code");
    if (!a.value || !c.value) return toast("מלא הכל", "#ef4444");
    db.ref('pending').push({ address: a.value, code: c.value });
    a.value = ""; c.value = "";
    toast("נשלח לאישור בענן! ☁️");
}

// ענן - אישור
function approve(id, address, code) {
    const newId = Date.now().toString();
    db.ref('codes/' + newId).set({ id: newId, address, code });
    db.ref('pending/' + id).remove();
    toast("אושר וסונכרן!");
}

function reject(id) { db.ref('pending/' + id).remove(); toast("נמחק"); }

// ענן - מחיקה
function deleteFromCloud(id) {
    showModal(`<h3>מחיקה</h3><p>למחוק פריט זה מהענן?</p>`, 
    `<button onclick="db.ref('codes/${id}').remove(); closeModal(); toast('נמחק');" style="background:var(--danger);">מחק</button>
     <button onclick="closeModal()" style="background:transparent; color:#94a3b8;">ביטול</button>`);
}

// ענן - עריכה
function editItem(id) {
    const item = data.find(d => d.id === id);
    showModal(`
        <h3>עריכת פריט</h3>
        <input id="editA" value="${item.address}" style="margin-bottom:10px;">
        <input id="editC" value="${item.code}">
    `, 
    `<button onclick="saveEdit('${id}')" style="background:var(--success);">שמור שינויים</button>
     <button onclick="closeModal()" style="background:transparent; color:#94a3b8;">ביטול</button>`);
}

function saveEdit(id) {
    const nA = document.getElementById("editA").value, nC = document.getElementById("editC").value;
    if (nA && nC) {
        db.ref('codes/' + id).update({ address: nA, code: nC });
        closeModal();
        toast("עודכן בענן");
    }
}

// Modal Logic
function showModal(content, btns) {
    document.getElementById("modalContent").innerHTML = content;
    document.getElementById("modalBtns").innerHTML = btns;
    document.getElementById("modal").style.display = "block";
}
function closeModal() { document.getElementById("modal").style.display = "none"; }

function exportCSV() {
    let csv = "\ufeffכתובת,קוד\n";
    data.forEach(item => { csv += `${item.address},${item.code}\n`; });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "backup.csv"; a.click();
}

function exportJSON() {
    const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "backup.json"; a.click();
}
</script>
</body>
</html>
